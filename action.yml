name: Maintainer Signal
description: Generate maintainer health, issue triage, and release-note reports for GitHub repositories.
author: Luke2program
branding:
  icon: activity
  color: blue
inputs:
  github-token:
    description: GitHub token used to read issues and pull requests.
    required: false
    default: ${{ github.token }}
  days:
    description: Number of recent days to inspect.
    required: false
    default: "30"
  output:
    description: Path to write the Markdown report.
    required: false
    default: signal-report.md
  min-score:
    description: Minimum health score before the action fails.
    required: false
    default: "0"
  openai-api-key:
    description: Optional OpenAI API key for an AI-generated maintainer brief. Leave unset for deterministic local-only reports.
    required: false
  openai-model:
    description: OpenAI model used for the optional maintainer brief.
    required: false
    default: gpt-4.1-mini
runs:
  using: node20
  main: src/action.mjs
